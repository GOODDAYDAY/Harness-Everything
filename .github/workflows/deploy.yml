name: Deploy harness on tag

on:
  push:
    tags:
      - 'harness-r*'

# Need write permission to advance the harness-last-good marker tag.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: harness-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout (for advancing last-good tag locally)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 43.128.100.101 >> ~/.ssh/known_hosts

      - name: Smoke test new tag on server
        id: smoke
        continue-on-error: true
        run: |
          ssh ubuntu@43.128.100.101 'bash -se' <<EOF
            set -e
            cd /home/ubuntu/harness-everything
            git fetch --all --tags --prune --force
            # Sync local main branch to the new tag (not detached HEAD), so the
            # service's auto_push later sees a real branch to push from.
            git checkout main
            git reset --hard ${{ github.ref_name }}
            # Sync server config from the tracked template (pipeline_server.json
            # is gitignored so git reset doesn't touch it; this ensures config
            # changes committed to the example template propagate automatically).
            # v2 single-phase orchestrate config is the active default since
            # 2026-04-21 — v1 (4-phase) preserved unchanged as the other file
            # for comparison. Switch back by changing the filename on this line.
            cp config/pipeline_example_self_improve_server_v2_orchestrate.json pipeline_server.json
            /home/ubuntu/harness-venv/bin/python -m py_compile \$(find harness -name "*.py") main.py
            /home/ubuntu/harness-venv/bin/python -c "from harness.pipeline.pipeline_loop import PipelineConfig; c=PipelineConfig.from_dict(__import__('json').load(open('pipeline_server.json'))); print('config ok: auto_tag_at_end=%s' % c.auto_tag_at_end)"
          EOF

      - name: On smoke pass — advance harness-last-good tag
        if: steps.smoke.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f harness-last-good ${{ github.ref_name }}
          git push -f origin harness-last-good

      - name: On smoke fail — rollback server to harness-last-good
        if: steps.smoke.outcome == 'failure'
        run: |
          ssh ubuntu@43.128.100.101 'bash -se' <<'EOF'
            set -e
            cd /home/ubuntu/harness-everything
            git fetch --all --tags --prune --force
            if ! git rev-parse --verify harness-last-good >/dev/null 2>&1; then
              echo "ABORT: harness-last-good tag does not exist — first deploy was bad. Manual fix required."
              exit 1
            fi
            git checkout main
            git reset --hard harness-last-good
            echo "ROLLED BACK to harness-last-good"
          EOF

      - name: Restart harness service (unless stop marker exists)
        run: |
          ssh ubuntu@43.128.100.101 'bash -se' <<'EOF'
            STOP_MARKER="$HOME/.config/harness/STOP_AFTER_CHUNK"
            if [ -f "$STOP_MARKER" ]; then
              rm "$STOP_MARKER"
              echo "STOP_AFTER_CHUNK marker found — service NOT restarted. Loop paused."
            else
              systemctl --user restart harness.service
              echo "Service restarted."
            fi
          EOF

      - name: Fail the workflow if smoke failed
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke test failed for ${{ github.ref_name }} — server rolled back to harness-last-good. Investigate the bad tag before pushing more."
          exit 1
